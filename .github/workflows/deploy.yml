name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: ✅ Validate package manager
        run: pnpm run validate:pm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type check
        run: pnpm run typecheck

      - name: 🎨 Lint
        run: pnpm run lint

      - name: 🏗️ Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL_PROD }}
        run: pnpm run build

      - name: 📤 Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/,ecosystem.config.js"
          target: "~/open_projects/hamutay/"

      - name: 🚀 Start/Restart app with pm2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/open_projects/hamutay
            npm list -g serve > /dev/null 2>&1 || npm install -g serve
            mkdir -p pm2_logs
            pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save
            echo "✅ App deployed"

      - name: ✅ Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 3
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Health check passed - HTTP $HTTP_STATUS"
            else
              echo "❌ Health check failed - HTTP $HTTP_STATUS"
              pm2 logs hamutay_frontend --lines 20
              exit 1
            fi
